# 4개 카테고리 × 17개 핵심 키워드 정의

categories:
  반도체:
    color: blue
    keywords:
      엔비디아:
        search_queries:
          - "엔비디아 GPU"
          - "엔비디아 실적"
        english_queries:
          - "NVIDIA GPU"

      베라 루빈:
        search_queries:
          - "베라 루빈"
          - "Vera Rubin"
        english_queries:
          - "Vera Rubin NVIDIA"

      SO-CAMM:
        search_queries:
          - "SOCAMM"
          - "SO-CAMM"
          - "소캠"
        english_queries:
          - "SOCAMM"

      CPO:
        search_queries:
          - "광반도체"
          - "실리콘 포토닉스"
          - "Co-Packaged Optics"
        english_queries:
          - "Co-Packaged Optics"

      DRAM:
        search_queries:
          - "HBM4"
          - "DRAM 시장"
          - "디램 가격"
        english_queries:
          - "HBM4"

      NAND:
        search_queries:
          - "낸드 플래시"
          - "NAND 가격"
        english_queries:
          - "NAND flash market"

      프로브카드:
        search_queries:
          - "프로브카드"
        english_queries:
          - "probe card"

  AI/데이터센터:
    color: orange
    keywords:
      AI 인프라 CapEx:
        search_queries:
          - "빅테크 CapEx"
          - "하이퍼스케일러 투자"
        english_queries:
          - "hyperscaler CapEx"

      데이터센터 냉각:
        search_queries:
          - "데이터센터 냉각"
          - "액체냉각"
        english_queries:
          - "data center liquid cooling"

      전력/송배전:
        search_queries:
          - "데이터센터 전력"
          - "AI 전력 수요"
        english_queries:
          - "AI data center power"

  2차전지:
    color: green
    keywords:
      전고체:
        search_queries:
          - "전고체 배터리"
        english_queries:
          - "solid-state battery"

      LFP:
        search_queries:
          - "LFP 배터리"
          - "리튬인산철"
        english_queries:
          - "LFP battery"

      건식전극:
        search_queries:
          - "건식전극"
        english_queries:
          - "dry electrode battery"

      실리콘 음극재:
        search_queries:
          - "실리콘 음극재"
        english_queries:
          - "silicon anode"

  로봇:
    color: purple
    keywords:
      휴머노이드:
        search_queries:
          - "휴머노이드 로봇"
          - "옵티머스"
        english_queries:
          - "humanoid robot"

      협동로봇:
        search_queries:
          - "협동로봇"
        english_queries:
          - "collaborative robot"

      로봇 부품:
        search_queries:
          - "로봇 감속기"
          - "하모닉 드라이브"
        english_queries:
          - "robot reducer"

# 필터링 설정
filter:
  max_age_hours: 24
  similarity_threshold: 75
  min_importance: 3
  max_per_category: 2          # 5 → 2
  max_news_for_analysis: 40    # 80 → 40
  claude_max_workers: 2
  claude_request_delay: 1.5
