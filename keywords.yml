name: Daily News Pipeline

on:
  schedule:
    # KST 07:40 = UTC 22:40 (전날)
    - cron: '40 22 * * *'
    # KST 16:10 = UTC 07:10
    - cron: '10 7 * * *'
  
  # 수동 실행 가능
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'test'
        type: choice
        options:
          - morning
          - evening
          - test

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
      
      - name: Python 셋업
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 실행 모드 결정
        id: determine-mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            # cron 시간으로 morning/evening 판단
            HOUR_UTC=$(date -u +%H)
            if [ "$HOUR_UTC" = "22" ]; then
              echo "mode=morning" >> $GITHUB_OUTPUT
            else
              echo "mode=evening" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: 파이프라인 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          DEBUG_MODE: ${{ steps.determine-mode.outputs.mode == 'test' && 'true' || 'false' }}
          TZ: Asia/Seoul
        run: |
          python -m src.main --mode ${{ steps.determine-mode.outputs.mode }}
      
      - name: 실패 시 알림
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=⚠️ Industry News Bot 실행 실패: $(date '+%Y-%m-%d %H:%M:%S KST')%0A%0A자세한 내용은 GitHub Actions 로그를 확인하세요."
